<g transform="translate(937 285) scale(6.2500)" fill="none" stroke="#22d3ee" stroke-width="0.544" stroke-linecap="round" stroke-linejoin="round" opacity="1"><path d="m17 2 4 4-4 4"></path><path d="M3 11v-1a4 4 0 0 1 4-4h14"></path><path d="m7 22-4-4 4-4"></path><path d="M21 13v1a4 4 0 0 1-4 4H3"></path></g>

