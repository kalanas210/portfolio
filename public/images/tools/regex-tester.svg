<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Regex Tester - Text tool">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0a1207"/>
    <stop offset="1" stop-color="#060510"/>
  </linearGradient>
  <radialGradient id="b1" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#34d399" stop-opacity="0.55"/>
    <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="b2" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#a3e635" stop-opacity="0.42"/>
