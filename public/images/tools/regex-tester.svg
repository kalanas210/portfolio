  </linearGradient>
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.3" fill="#ffffff" opacity="0.05"/>
  </pattern>
</defs>

<rect width="1280" height="720" fill="url(#bg)"/>
