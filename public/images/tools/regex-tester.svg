<g transform="translate(937 285) scale(6.2500)" fill="none" stroke="#34d399" stroke-width="0.544" stroke-linecap="round" stroke-linejoin="round" opacity="1"><path d="M17 3v10"></path><path d="m12.67 5.5 8.66 5"></path><path d="m12.67 10.5 8.66-5"></path><path d="M9 17a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-2z"></path></g>

